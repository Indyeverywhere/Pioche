<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transférer Playlist YouTube → Spotify</title>

    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js" crossorigin="anonymous"></script>
    <script>
        window.googletag = window.googletag || { cmd: [] };

        googletag.cmd.push(function () {
            const mapping = googletag.sizeMapping()
                .addSize([1024, 0], [[970, 250], [728, 90], [320, 100]])
                .addSize([768, 0], [[728, 90], [320, 100]])
                .addSize([0, 0], [[320, 100], [300, 250]])
                .build();

            googletag.defineSlot(
                '/123456789/spotify_top_banner',
                [[970, 250], [728, 90], [320, 100], [300, 250]],
                'div-gpt-ad-top-banner'
            )
            .defineSizeMapping(mapping)
            .addService(googletag.pubads());

            googletag.pubads().enableSingleRequest();
            googletag.enableServices();
        });
    </script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .top-banner-wrapper {
            width: 100%;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        #div-gpt-ad-top-banner {
            width: 100%;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin: 6px;
        }

        button:hover {
            background-color: #1ed760;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .secondary-button {
            background-color: #191414;
        }

        .secondary-button:hover {
            background-color: #333333;
        }

        .status {
            margin-top: 12px;
            font-size: 14px;
            color: #444;
            min-height: 20px;
        }

        .success {
            color: #14833b;
        }
    </style>
</head>
<body>
    <div class="top-banner-wrapper">
        <div id="div-gpt-ad-top-banner">
            <script>
                googletag.cmd.push(function () {
                    googletag.display('div-gpt-ad-top-banner');
                });
            </script>
        </div>
    </div>

    <h1>Transférer une playlist YouTube → Spotify</h1>
    <p>Commence par connecter ton compte Spotify, puis renseigne le nom de ta playlist et colle son lien YouTube :</p>

    <button class="secondary-button" onclick="loginSpotify()">Connecter Spotify</button>

    <input type="text" id="playlistName" placeholder="Nom de ta playlist (ex: Road Trip 2026)">
    <input type="text" id="playlistUrl" placeholder="Ex: https://www.youtube.com/playlist?list=PL...">
    <br>
    <button id="transferBtn" onclick="sendToN8n()">Transférer</button>

    <div class="status" id="statusMessage"></div>

    <script>
        const SPOTIFY_LOGIN_WEBHOOK = "https://everywhere.app.n8n.cloud/webhook/spotify-login";
        const TRANSFER_WEBHOOK = "https://everywhere.app.n8n.cloud/webhook/transfert-playlist";

        function getOrCreateSessionId() {
            let sessionId = localStorage.getItem("sessionId");

            if (!sessionId) {
                if (window.crypto && crypto.randomUUID) {
                    sessionId = crypto.randomUUID();
                } else {
                    sessionId = "session-" + Date.now() + "-" + Math.random().toString(36).substring(2, 10);
                }
                localStorage.setItem("sessionId", sessionId);
            }

            return sessionId;
        }

        function loginSpotify() {
            const sessionId = getOrCreateSessionId();
            const status = document.getElementById("statusMessage");
            status.className = "status";
            status.textContent = "Redirection vers Spotify...";
            window.location.href = `${SPOTIFY_LOGIN_WEBHOOK}?sessionId=${encodeURIComponent(sessionId)}`;
        }

        function handleSpotifyReturn() {
            const params = new URLSearchParams(window.location.search);
            const spotifyStatus = params.get("spotify");

            if (spotifyStatus === "success") {
                const status = document.getElementById("statusMessage");
                status.className = "status success";
                status.textContent = "Compte Spotify connecté avec succès.";

                const cleanUrl = window.location.origin + window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
            }
        }

        function sendToN8n() {
            const playlistName = document.getElementById("playlistName").value.trim();
            const url = document.getElementById("playlistUrl").value.trim();
            const button = document.getElementById("transferBtn");
            const status = document.getElementById("statusMessage");
            const sessionId = getOrCreateSessionId();

            if (!playlistName) {
                alert("Merci de renseigner le nom de la playlist.");
                return;
            }

            const playlistId = extractPlaylistId(url);
            if (!playlistId) {
                alert("Lien de playlist YouTube invalide. Veuillez vérifier le format.");
                return;
            }

            button.disabled = true;
            status.className = "status";
            status.textContent = "Transfert en cours...";

            fetch(TRANSFER_WEBHOOK, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    sessionId: sessionId,
                    playlistId: playlistId,
                    playlistName: playlistName
                })
            })
            .then(response => {
                if (response.ok) {
                    alert("Transfert lancé avec succès ! Cela peut prendre plusieurs minutes en fonction du nombre de titres.");
                    status.className = "status success";
                    status.textContent = "Transfert lancé avec succès.";
                } else {
                    alert("Erreur lors du transfert. Veuillez réessayer.");
                    status.className = "status";
                    status.textContent = "Erreur lors du transfert.";
                }
            })
            .catch(() => {
                alert("Erreur réseau. Veuillez vérifier votre connexion.");
                status.className = "status";
                status.textContent = "Erreur réseau. Veuillez vérifier votre connexion.";
            })
            .finally(() => {
                button.disabled = false;
            });
        }

        function extractPlaylistId(url) {
            const regExp = /^.*(youtu\.be\/|list=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length >= 10) {
                return match[2];
            }
            return null;
        }

        handleSpotifyReturn();
    </script>
</body>
</html>
