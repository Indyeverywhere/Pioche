<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transférer Playlist YouTube → Spotify</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6987888174560386"
     crossorigin="anonymous"></script>

    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js" crossorigin="anonymous"></script>
    <script>
        window.googletag = window.googletag || { cmd: [] };

        googletag.cmd.push(function () {
            const mapping = googletag.sizeMapping()
                .addSize([1024, 0], [[970, 250], [728, 90], [320, 100]])
                .addSize([768, 0], [[728, 90], [320, 100]])
                .addSize([0, 0], [[320, 100], [300, 250]])
                .build();

            googletag.defineSlot(
                '/123456789/spotify_top_banner',
                [[970, 250], [728, 90], [320, 100], [300, 250]],
                'div-gpt-ad-top-banner'
            )
            .defineSizeMapping(mapping)
            .addService(googletag.pubads());

            googletag.pubads().enableSingleRequest();
            googletag.enableServices();
        });
    </script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .top-banner-wrapper {
            width: 100%;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        #div-gpt-ad-top-banner {
            width: 100%;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin: 6px;
        }

        button:hover {
            background-color: #1ed760;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .secondary-button {
            background-color: #191414;
        }

        .secondary-button:hover {
            background-color: #333333;
        }

        .status {
            margin-top: 12px;
            font-size: 14px;
            color: #444;
            min-height: 20px;
        }

        .success {
            color: #14833b;
        }

        .error {
            color: #c0392b;
        }

        .spotify-connection-wrapper {
            margin: 12px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 44px;
        }

        .spotify-connected {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #14833b;
            background: #f3fff7;
            border: 1px solid #bfe8cb;
            border-radius: 999px;
            padding: 10px 16px;
        }

        .green-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #1DB954;
            display: inline-block;
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.15);
        }

        .hidden {
            display: none !important;
        }

        /* ---- Indicateur de progression du transfert ---- */
        .progress-wrapper {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 38px;
            height: 38px;
            border: 4px solid rgba(29, 185, 84, 0.2);
            border-top-color: #1DB954;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-text {
            font-size: 15px;
            color: #444;
        }

        /* trois points qui s'affichent progressivement */
        .dots::after {
            content: '';
            animation: dots 1.4s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        .result-box {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
            text-align: left;
        }

        .result-box.ok {
            background: #f3fff7;
            border: 1px solid #bfe8cb;
            color: #14833b;
        }

        .result-box.ko {
            background: #fff5f4;
            border: 1px solid #f1c4bf;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="top-banner-wrapper">
        <div id="div-gpt-ad-top-banner">
            <script>
                googletag.cmd.push(function () {
                    googletag.display('div-gpt-ad-top-banner');
                });
            </script>
        </div>
    </div>

    <h1>Transférer une playlist YouTube → Spotify</h1>
    <p>Commence par connecter ton compte Spotify, puis renseigne le nom de ta playlist et colle son lien YouTube :</p>

    <div class="spotify-connection-wrapper">
        <button id="spotifyLoginBtn" class="secondary-button" onclick="loginSpotify()">Connecter Spotify</button>

        <div id="spotifyConnectedBadge" class="spotify-connected hidden">
            <span class="green-dot"></span>
            <span>Spotify : Connecté</span>
        </div>
    </div>

    <input type="text" id="playlistName" placeholder="Nom de ta playlist (ex: Road Trip 2026)">
    <input type="text" id="playlistUrl" placeholder="Ex: https://www.youtube.com/playlist?list=PL...">
    <br>
    <button id="transferBtn" onclick="sendToN8n()" disabled>Transférer</button>

    <div class="status" id="statusMessage"></div>

    <!-- Indicateur de transfert en cours -->
    <div id="progressWrapper" class="progress-wrapper hidden">
        <div class="spinner"></div>
        <div class="progress-text"><span id="progressLabel">Transfert en cours</span><span class="dots"></span></div>
    </div>

    <!-- Résultat final -->
    <div id="resultBox" class="result-box hidden"></div>

    <script>
        const SPOTIFY_LOGIN_WEBHOOK = "https://everywhere.app.n8n.cloud/webhook/spotify-login";
        const TRANSFER_WEBHOOK = "https://everywhere.app.n8n.cloud/webhook/transfert-playlist";
        const STATUS_WEBHOOK = "https://everywhere.app.n8n.cloud/webhook/transfert-status";

        const POLL_INTERVAL_MS = 3000;      // intervalle d'interrogation du statut
        const MAX_POLL_MS = 15 * 60 * 1000; // garde-fou : on arrête de poller au bout de 15 min

        let pollTimer = null;

        function getOrCreateSessionId() {
            let sessionId = localStorage.getItem("sessionId");

            if (!sessionId) {
                if (window.crypto && crypto.randomUUID) {
                    sessionId = crypto.randomUUID();
                } else {
                    sessionId = "session-" + Date.now() + "-" + Math.random().toString(36).substring(2, 10);
                }
                localStorage.setItem("sessionId", sessionId);
            }

            return sessionId;
        }

        function setSpotifyConnectedUI(isConnected) {
            const loginBtn = document.getElementById("spotifyLoginBtn");
            const connectedBadge = document.getElementById("spotifyConnectedBadge");
            const transferBtn = document.getElementById("transferBtn");

            if (isConnected) {
                loginBtn.classList.add("hidden");
                connectedBadge.classList.remove("hidden");
                transferBtn.disabled = false;
            } else {
                loginBtn.classList.remove("hidden");
                connectedBadge.classList.add("hidden");
                transferBtn.disabled = true;
            }
        }

        function loginSpotify() {
            const sessionId = getOrCreateSessionId();
            const status = document.getElementById("statusMessage");
            status.className = "status";
            status.textContent = "Redirection vers Spotify...";
            window.location.href = `${SPOTIFY_LOGIN_WEBHOOK}?sessionId=${encodeURIComponent(sessionId)}`;
        }

        function handleSpotifyReturn() {
            const params = new URLSearchParams(window.location.search);
            const spotifyStatus = params.get("spotify");

            if (spotifyStatus === "success") {
                localStorage.setItem("spotifyConnected", "true");

                const status = document.getElementById("statusMessage");
                status.className = "status success";
                status.textContent = "Compte Spotify connecté avec succès.";

                setSpotifyConnectedUI(true);

                const cleanUrl = window.location.origin + window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
            }
        }

        function restoreSpotifyState() {
            const spotifyConnected = localStorage.getItem("spotifyConnected") === "true";
            setSpotifyConnectedUI(spotifyConnected);
        }

        // ---- Affichage de la progression / du résultat ----
        function showProgress(label) {
            document.getElementById("resultBox").classList.add("hidden");
            document.getElementById("progressLabel").textContent = label || "Transfert en cours";
            document.getElementById("progressWrapper").classList.remove("hidden");
        }

        function hideProgress() {
            document.getElementById("progressWrapper").classList.add("hidden");
        }

        function showResult(text, isError) {
            hideProgress();
            const box = document.getElementById("resultBox");
            box.textContent = text;
            box.className = "result-box " + (isError ? "ko" : "ok");
            box.classList.remove("hidden");
        }

        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        function startPolling(sessionId, button) {
            const startedAt = Date.now();
            stopPolling();

            pollTimer = setInterval(async () => {
                if (Date.now() - startedAt > MAX_POLL_MS) {
                    stopPolling();
                    showResult("Le transfert prend plus de temps que prévu. Il se poursuit en arrière-plan, reviens dans quelques minutes.", true);
                    button.disabled = false;
                    return;
                }

                try {
                    const res = await fetch(`${STATUS_WEBHOOK}?sessionId=${encodeURIComponent(sessionId)}`, { cache: "no-store" });
                    const data = await res.json().catch(() => ({}));

                    if (data.status === "done") {
                        stopPolling();
                        showResult(data.recap || "Transfert terminé.", false);
                        button.disabled = false;
                    } else if (data.status === "error") {
                        stopPolling();
                        showResult(data.recap || "Une erreur est survenue pendant le transfert.", true);
                        button.disabled = false;
                    } else {
                        // status running / unknown : on met à jour le libellé si disponible
                        showProgress(data.step || (data.total ? `Traitement de ${data.total} titres` : "Transfert en cours"));
                    }
                } catch (e) {
                    // erreur réseau transitoire : on laisse le polling continuer
                }
            }, POLL_INTERVAL_MS);
        }

        function sendToN8n() {
            const spotifyConnected = localStorage.getItem("spotifyConnected") === "true";
            if (!spotifyConnected) {
                alert("Merci de connecter Spotify avant de lancer le transfert.");
                return;
            }

            const playlistName = document.getElementById("playlistName").value.trim();
            const url = document.getElementById("playlistUrl").value.trim();
            const button = document.getElementById("transferBtn");
            const status = document.getElementById("statusMessage");
            const sessionId = getOrCreateSessionId();

            if (!playlistName) {
                alert("Merci de renseigner le nom de la playlist.");
                return;
            }

            const playlistId = extractPlaylistId(url);
            if (!playlistId) {
                alert("Lien de playlist YouTube invalide. Veuillez vérifier le format.");
                return;
            }

            button.disabled = true;
            status.className = "status";
            status.textContent = "";
            document.getElementById("resultBox").classList.add("hidden");
            showProgress("Transfert en cours");

            fetch(TRANSFER_WEBHOOK, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    sessionId: sessionId,
                    playlistId: playlistId,
                    playlistName: playlistName
                })
            })
            .then(async (response) => {
                const data = await response.json().catch(() => ({}));

                // En cas d'erreur de validation (400), n8n renvoie un texte / pas de status "running"
                if (!response.ok) {
                    const txt = data && data.message ? data.message : "Erreur lors du lancement du transfert.";
                    showResult(txt, true);
                    button.disabled = false;
                    return;
                }

                // Transfert accepté : on bascule en mode polling
                startPolling(sessionId, button);
            })
            .catch(() => {
                showResult("Erreur réseau. Veuillez vérifier votre connexion.", true);
                button.disabled = false;
            });
        }

        function extractPlaylistId(url) {
            const regExp = /^.*(youtu\.be\/|list=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length >= 10) {
                return match[2];
            }
            return null;
        }

        restoreSpotifyState();
        handleSpotifyReturn();
    </script>
</body>
</html>
