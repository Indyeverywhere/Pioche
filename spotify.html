<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transférer Playlist YouTube → Spotify</title>

    <!--
      ============================================================
      SÉCURITÉ : à compléter CÔTÉ SERVEUR (impossible via <meta>)
      ============================================================
      - HSTS                : Strict-Transport-Security: max-age=63072000; includeSubDomains; preload
      - Isolation contexte  : Cross-Origin-Opener-Policy: same-origin
                              Cross-Origin-Embedder-Policy: require-corp   (recos #16)
      - Anti-clickjacking    : X-Frame-Options / CSP frame-ancestors
      - CSRF (validation)    : n8n DOIT vérifier l'en-tête X-CSRF-Token (reco #3)
      - Auth réelle          : n8n DOIT revalider la session Spotify à chaque
                               appel transfer/status. Le flag client n'est qu'un
                               indice d'UI, jamais une frontière de sécurité (reco #4)
      - Rate limiting        : limiter par sessionId / IP côté n8n (reco #11)
      ============================================================
    -->

    <!-- (#5)(#1) Content Security Policy stricte + upgrade-insecure-requests.
         NB : pas de 'unsafe-inline' pour les scripts -> tout le JS est dans app.js.
         Si une régie pub remonte une violation CSP en console, ajoutez le domaine
         Google concerné à script-src / frame-src. -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' https://pagead2.googlesyndication.com https://securepubads.g.doubleclick.net https://www.googletagservices.com https://tpc.googlesyndication.com;
                   style-src 'self' 'unsafe-inline';
                   connect-src 'self' https://everywhere.app.n8n.cloud https://pagead2.googlesyndication.com https://securepubads.g.doubleclick.net;
                   img-src 'self' data: https:;
                   font-src 'self' data:;
                   frame-src https://accounts.spotify.com https://googleads.g.doubleclick.net https://*.safeframe.googlesyndication.com https://*.doubleclick.net https://www.google.com;
                   form-action 'self' https://everywhere.app.n8n.cloud;
                   base-uri 'self';
                   object-src 'none';
                   upgrade-insecure-requests;">

    <!-- (#15) Limite la fuite des URLs n8n dans l'en-tête Referer -->
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!--
      (#6) Subresource Integrity (SRI) : recommandé, mais NON applicable aux scripts
      publicitaires Google (adsbygoogle.js / gpt.js). Google les met à jour en
      continu et ne fournit pas de hash stable : ajouter integrity="sha384-..."
      CASSERAIT le chargement des pubs. La protection réaliste ici est
      l'allow-list 'script-src' de la CSP ci-dessus + crossorigin + referrerpolicy.
    -->
    <script async
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6987888174560386"
            crossorigin="anonymous"
            referrerpolicy="strict-origin-when-cross-origin"></script>

    <script async
            src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"
            crossorigin="anonymous"
            referrerpolicy="strict-origin-when-cross-origin"></script>

    <!-- Logique applicative externalisée (couverte par script-src 'self') -->
    <script src="app.js" defer></script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .top-banner-wrapper {
            width: 100%;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        #div-gpt-ad-top-banner {
            width: 100%;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin: 6px;
        }

        button:hover {
            background-color: #1ed760;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .secondary-button {
            background-color: #191414;
        }

        .secondary-button:hover {
            background-color: #333333;
        }

        .link-button {
            background: none;
            border: none;
            color: #14833b;
            text-decoration: underline;
            font-size: 13px;
            padding: 0;
            margin: 0 0 0 4px;
            cursor: pointer;
        }
        .link-button:hover { background: none; color: #0f6b30; }

        .cancel-button {
            background-color: #c0392b;
        }
        .cancel-button:hover { background-color: #e05545; }

        .status {
            margin-top: 12px;
            font-size: 14px;
            color: #444;
            min-height: 20px;
        }

        .success { color: #14833b; }
        .error { color: #c0392b; }

        .spotify-connection-wrapper {
            margin: 12px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 44px;
        }

        .spotify-connected {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #14833b;
            background: #f3fff7;
            border: 1px solid #bfe8cb;
            border-radius: 999px;
            padding: 10px 16px;
        }

        .green-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #1DB954;
            display: inline-block;
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.15);
        }

        .hidden { display: none !important; }

        /* Accessibilité : libellés visuellement masqués mais lus par les lecteurs d'écran */
        .visually-hidden {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap; border: 0;
        }

        /* ---- Indicateur de progression du transfert ---- */
        .progress-wrapper {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 38px;
            height: 38px;
            border: 4px solid rgba(29, 185, 84, 0.2);
            border-top-color: #1DB954;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-text {
            font-size: 15px;
            color: #444;
        }

        /* trois points qui s'affichent progressivement */
        .dots::after {
            content: '';
            animation: dots 1.4s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        .result-box {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
            text-align: left;
        }

        .result-box.ok {
            background: #f3fff7;
            border: 1px solid #bfe8cb;
            color: #14833b;
        }

        .result-box.ko {
            background: #fff5f4;
            border: 1px solid #f1c4bf;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="top-banner-wrapper">
        <!-- (#14) Le slot est défini et rafraîchi par app.js après DOMContentLoaded,
             via disableInitialLoad() + refresh(), pour ne pas bloquer le rendu. -->
        <div id="div-gpt-ad-top-banner"></div>
    </div>

    <h1>Transférer une playlist YouTube → Spotify</h1>
    <p>Commence par connecter ton compte Spotify, puis renseigne le nom de ta playlist et colle son lien YouTube :</p>

    <div class="spotify-connection-wrapper">
        <button id="spotifyLoginBtn" class="secondary-button" type="button">Connecter Spotify</button>

        <div id="spotifyConnectedBadge" class="spotify-connected hidden">
            <span class="green-dot"></span>
            <span>Spotify : Connecté</span>
            <!-- (#10) Déconnexion = rotation de session -->
            <button id="spotifyLogoutBtn" class="link-button" type="button">Déconnecter</button>
        </div>
    </div>

    <label for="playlistName" class="visually-hidden">Nom de la playlist</label>
    <input type="text" id="playlistName" maxlength="100" autocomplete="off"
           placeholder="Nom de ta playlist (ex: Road Trip 2026)">

    <label for="playlistUrl" class="visually-hidden">Lien de la playlist YouTube</label>
    <input type="url" id="playlistUrl" inputmode="url" autocomplete="off"
           placeholder="Ex: https://www.youtube.com/playlist?list=PL...">
    <br>
    <button id="transferBtn" type="button" disabled>Transférer</button>
    <!-- (#19) Bouton d'annulation, masqué tant qu'aucun transfert n'est en cours -->
    <button id="cancelBtn" type="button" class="cancel-button hidden">Annuler</button>

    <div class="status" id="statusMessage" role="status" aria-live="polite"></div>

    <!-- Indicateur de transfert en cours -->
    <div id="progressWrapper" class="progress-wrapper hidden" aria-live="polite">
        <div class="spinner" role="img" aria-label="Transfert en cours"></div>
        <div class="progress-text"><span id="progressLabel">Transfert en cours</span><span class="dots"></span></div>
    </div>

    <!-- Résultat final -->
    <div id="resultBox" class="result-box hidden" role="status" aria-live="polite"></div>
</body>
</html>
